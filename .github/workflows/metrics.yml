name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - filename: metrics.classic.svg
            base: header, repositories
            plugin_lines: yes
          - filename: metrics.plugin.isocalendar.svg
            plugin_isocalendar: yes
            plugin_isocalendar_duration: full-year
          - filename: metrics.plugin.languages.svg
            plugin_languages: yes
          - filename: metrics.plugin.leetcode.svg
            plugin_leetcode: yes
            plugin_leetcode_user: Sivanandh
            plugin_leetcode_sections: solved, skills, recent
          - filename: metrics.plugin.achievements.svg
            plugin_achievements: yes
            plugin_achievements_display: compact
            plugin_achievements_secrets: yes
            base: ""
          - filename: metrics.plugin.habits.svg
            plugin_habits: yes
            plugin_habits_from: 200
            plugin_habits_days: 14
            plugin_habits_charts: yes
            base: ""
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: ${{ matrix.filename }}
          token: ${{ secrets.METRICS_TOKEN }}
          base: ${{ matrix.base || '' }}
          plugin_isocalendar: ${{ matrix.plugin_isocalendar || 'no' }}
          plugin_isocalendar_duration: ${{ matrix.plugin_isocalendar_duration || '' }}
          plugin_languages: ${{ matrix.plugin_languages || 'no' }}
          plugin_leetcode: ${{ matrix.plugin_leetcode || 'no' }}
          plugin_leetcode_user: ${{ matrix.plugin_leetcode_user || '' }}
          plugin_leetcode_sections: ${{ matrix.plugin_leetcode_sections || '' }}
          plugin_lines: ${{ matrix.plugin_lines || 'no' }}
          plugin_achievements: ${{ matrix.plugin_achievements || 'no' }}
          plugin_achievements_display: ${{ matrix.plugin_achievements_display || '' }}
          plugin_achievements_secrets: ${{ matrix.plugin_achievements_secrets || 'yes' }}
          plugin_habits: ${{ matrix.plugin_habits || 'no' }}
          plugin_habits_from: ${{ matrix.plugin_habits_from || '' }}
          plugin_habits_days: ${{ matrix.plugin_habits_days || '' }}
          plugin_habits_charts: ${{ matrix.plugin_habits_charts || 'no' }}
